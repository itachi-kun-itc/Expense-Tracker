<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#f7f7f2"><title>Expence-Tracker</title><script>if(location.hostname.endsWith(".github.io"))location.replace(`https://expence-tracker-bpc.pages.dev/${location.search}${location.hash}`)</script><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css?v=20260720-6"><link rel="stylesheet" href="ui.css?v=20260720-25"><link rel="stylesheet" href="salary.css?v=20260720-24"><link rel="stylesheet" href="workspace-overrides.css?v=20260720-6"><link rel="stylesheet" href="academic.css?v=20260720-6"></head><body data-authenticated="false"><div class="phone-landscape-blocker">スマートフォンの横画面は<br>サポートされておりません。</div>
<div class="app-shell"><aside class="sidebar"><a class="brand" href="#"><span class="brand-mark">E</span><span class="brand-name">Expence<br><b>Tracker</b></span></a><nav class="main-nav"><button class="nav-item active" data-view="dashboard"><span data-icon="home"></span>ホーム</button><button class="nav-item" data-view="finances"><span data-icon="wallet"></span>家計</button><button class="nav-item" data-view="salary"><span data-icon="salary"></span>給与</button><button class="nav-item" data-view="cards"><span data-icon="card"></span>カード履歴</button><button class="nav-item" data-view="settings"><span data-icon="settings"></span>設定</button></nav></aside>
<main><header class="topbar"><div><p class="eyebrow" id="todayLabel"></p><h1 id="pageTitle">ホーム</h1></div><div class="top-actions"><label class="month-picker"><span>‹</span><input type="month" id="monthPicker"><span>›</span></label><button class="avatar" data-account-open aria-label="アカウント"><span data-account-avatar>私</span></button></div></header><div class="content">
<section id="dashboardView" class="view active"><article class="home-asset-card"><div class="home-asset-main"><p class="label">総資産</p><div class="home-asset-value" id="dashboardAssetTotal">0円</div><p class="home-asset-asof" id="dashboardAssetAsOf">今日時点</p></div><div class="home-next-pay"><div><p id="dashboardForecastLabel">次の給料振込日時点の資産見込み</p><small id="dashboardForecastDate">給与日未設定</small></div><strong id="dashboardForecastValue">0円</strong></div></article><article class="panel home-salary-card"><div><p class="label">今月の給料の合計</p><p class="subtle">給与として登録された収入</p></div><strong id="dashboardSalaryTotal">0円</strong></article><div class="section-heading home-category-heading"><div><h2>今月の入出金</h2><p>カテゴリごとの合計</p></div></div><div class="home-category-grid"><article class="panel home-category-panel"><div class="home-category-title"><h2>収入</h2><strong id="dashboardIncomeTotal">0円</strong></div><div id="dashboardIncomeCategories" class="home-category-list"></div></article><article class="panel home-category-panel"><div class="home-category-title"><h2>支出</h2><strong id="dashboardExpenseTotal">0円</strong></div><div id="dashboardExpenseCategories" class="home-category-list"></div></article></div></section>
<section id="financesView" class="view"><div class="finance-topline"><div class="month-stepper finance-month-stepper"><button type="button" data-finance-month-step="-1" aria-label="前月">‹</button><input type="month" data-finance-month><button type="button" data-finance-month-step="1" aria-label="翌月">›</button></div></div><div data-finance-panel="transactions"><div class="section-heading"><div></div><button class="primary-btn" data-open-modal>＋ 記録を追加</button></div><div class="filter-row"><button class="filter active" data-filter="all">すべて</button><button class="filter" data-filter="expense">支出</button><button class="filter" data-filter="income">収入</button></div><article class="panel table-panel"><div id="transactionTable"></div></article><article class="panel expense-breakdown-panel"><div class="card-head"><div><h2>支出の割合</h2><p class="subtle">カテゴリ別の支出構成</p></div></div><div id="expenseBreakdown" class="expense-breakdown"></div></article></div></section>
<section id="cardsView" class="view"><div class="card-memo-topline"><div><h2>クレジットカード履歴メモ</h2><p>利用履歴を月ごとに記録</p></div><div class="month-stepper card-month-stepper"><button type="button" data-card-month-step="-1" aria-label="前月">‹</button><input type="month" data-card-month><button type="button" data-card-month-step="1" aria-label="翌月">›</button></div></div><article class="panel card-history-panel"><div id="cardHistoryList"></div></article><button type="button" class="card-history-fab" data-open-card-modal aria-label="カード履歴を追加">＋</button></section>
<section id="settingsView" class="view"><div class="settings-heading"><h2>設定</h2><p>アカウントとデータ管理</p></div><div class="settings-list"><button type="button" class="settings-row" data-account-open><span data-icon="user"></span><span><b>アカウント</b><small data-account-label>ログイン</small></span><i>›</i></button><div class="settings-row"><span data-icon="cloud"></span><span><b>Cloudflare同期</b><small>ログインすると複数端末で同期します</small></span></div><button type="button" class="settings-row settings-danger" id="resetButton"><span data-icon="reset"></span><span><b>すべて0に戻す</b><small>アプリ内の保存データを初期化します</small></span><i>›</i></button></div></section>
</div></main><nav class="mobile-nav" aria-label="メインメニュー"><button type="button" class="active" data-view="dashboard"><i data-icon="home"></i><span>ホーム</span></button><button type="button" data-view="finances"><i data-icon="wallet"></i><span>家計</span></button><button type="button" data-view="salary"><i data-icon="salary"></i><span>給与</span></button><button type="button" data-view="cards"><i data-icon="card"></i><span>カード</span></button><button type="button" data-view="settings"><i data-icon="settings"></i><span>設定</span></button></nav></div>
<dialog id="transactionModal"><form method="dialog" id="transactionForm"><div class="modal-head"><div><p class="eyebrow">NEW RECORD</p><h2>入出金を記録</h2></div><button type="button" class="close-btn" data-close>← 戻る</button></div><div class="type-switch"><label><input type="radio" name="type" value="expense" checked><span>支出</span></label><label><input type="radio" name="type" value="income"><span>収入</span></label></div><label>金額<div class="money-input"><input id="amountInput" type="number" min="1" required placeholder="3,000"><span>円</span></div></label><div class="form-grid"><label>日付<input id="dateInput" type="date" required></label><label>カテゴリ<select id="categoryInput"></select></label></div><label>メモ<input id="memoInput" type="text" maxlength="40" placeholder="駅前のスーパー"></label><button class="primary-btn wide" value="default">保存する</button></form></dialog><div id="toast" role="status">保存しました</div><script src="app.js?v=20260720-26"></script><script src="salary.js?v=20260720-21"></script><script src="academic.js?v=20260720-6"></script><script src="account.js?v=20260720-10"></script></body></html>
